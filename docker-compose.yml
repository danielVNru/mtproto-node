services:
  service-node:
    build:
      context: .
      network: host
    container_name: mtproto-service-node
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${PORT:-8443}:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - .:/app/project
    environment:
      - PORT=8443
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DATA_DIR=/app/data
    networks:
      - mtproto-net

networks:
  mtproto-net:
    name: mtproto-net
    driver: bridge
